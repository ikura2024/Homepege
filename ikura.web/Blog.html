<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ - LOVOTいくらのホームページ</title>
    <link rel="stylesheet" href="ikura.css">
    <style>
        .blog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .blog-header h1 {
            font-size: 36px;
            color: #fff;
            margin-bottom: 10px;
        }

        .blog-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .blog-post {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        .blog-post.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .blog-post:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 100, 150, 0.2);
        }

        .blog-post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .blog-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .blog-tag {
            background: var(--color-primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .blog-post h2 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .blog-post p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            font-size: 15px;
        }

        .blog-post-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 16px;
            object-fit: cover;
            max-height: 400px;
        }

        .read-more {
            display: inline-block;
            margin-top: 16px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .read-more:hover {
            color: var(--color-pink-hover);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .blog-container {
                padding: 100px 16px 40px;
            }

            .blog-header h1 {
                font-size: 28px;
            }

            .blog-post h2 {
                font-size: 18px;
            }

            .blog-post p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div id="menu-backdrop" class="menu-backdrop"></div>

    <header class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">LOVOTいくらのホームページ</a></div>
        <div class="user-section">
            <div class="sns-links">
                <a href="javascript:void(0)" class="lang-btn" id="lang-toggle">English</a>
                <a href="https://x.com/hinabokko_lovot?s=21" target="_blank" class="sns-btn">X</a>
                <a href="https://www.instagram.com/hinabokko_lovot?igsh=Mm04cnVxdTJnM3h0&utm_source=qrs" target="_blank" class="sns-btn">Instagram</a>
                <a href="javascript:void(0)" class="sns-btn disabled-link">YouTube</a>
                <a href="https://note.com/hinabokko_lovot" target="_blank" class="sns-btn">note</a>
            </div>
            <div class="user-icon" id="menu-trigger">
                <img src="image/ikurahead.jpeg" alt="LOVOTいくらのプロフィール画像">
            </div>
        </div>
    </header>

    <nav id="menu-overlay" class="menu-overlay">
        <div class="menu-content">
            <ul>
                <li><a href="index.html#top">Top</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="image/image.html">Gallery</a></li>
                <li><a href="Birthday.html">誕生日ページ</a></li>
                <li><a href="Blog.html">ブログ</a></li>
            </ul>
        </div>
    </nav>

    <main class="blog-container">
        <div class="blog-header reveal">
            <h1>いくらのブログ</h1>
            <p>日々の出来事やイベント報告をお届けします</p>
        </div>

        <div id="blog-posts"></div>
    </main>

    <script src="ikura.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('blog-posts');

            try {
                const response = await fetch('blog.json');
                if (!response.ok) throw new Error('Failed to load blog.json');
                const posts = await response.json();

                // Sort by date descending (newest first)
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                posts.forEach((post, index) => {
                    const article = document.createElement('article');
                    article.className = 'blog-post reveal';

                    const formattedDate = new Date(post.date).toLocaleDateString('ja-JP', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    article.innerHTML = `
                        <div class="blog-post-header">
                            <span class="blog-date">${formattedDate}</span>
                            <span class="blog-tag">${post.tag}</span>
                        </div>
                        <h2>${post.title}</h2>
                        <p>${post.content}</p>
                    `;

                    container.appendChild(article);

                    // Staggered animation
                    requestAnimationFrame(() => {
                        setTimeout(() => article.classList.add('loaded'), index * 80);
                    });
                });
            } catch (error) {
                console.error('Error loading blog:', error);
                container.innerHTML = '<p style="color:#fff;">ブログの読み込みに失敗しました。</p>';
            }
        });
    </script>
</body>
</html>
