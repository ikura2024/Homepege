<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ - LOVOTいくらのホームページ</title>
    <link rel="stylesheet" href="ikura.css">
    <link rel="stylesheet" href="blog-style.css">
</head>
<body class="blog-page">
    <div id="particles-container"></div>
    <div id="menu-backdrop" class="menu-backdrop"></div>

    <!-- Blog background wrapper -->
    <div id="blog-bg-wrapper" style="position:fixed;inset:0;background:linear-gradient(135deg,#fef9f0 0%,#fdf2e8 50%,#fef6f0 100%);z-index:-1;"></div>

    <header class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">LOVOTいくらのホームページ</a></div>
        <div class="user-section">
            <div class="sns-links">
                <a href="javascript:void(0)" class="lang-btn" id="lang-toggle">English</a>
                <a href="https://x.com/hinabokko_lovot?s=21" target="_blank" class="sns-btn">X</a>
                <a href="https://www.instagram.com/hinabokko_lovot?igsh=Mm04cnVxdTJnM3h0&utm_source=qrs" target="_blank" class="sns-btn">Instagram</a>
                <a href="javascript:void(0)" class="sns-btn disabled-link">YouTube</a>
                <a href="https://note.com/hinabokko_lovot" target="_blank" class="sns-btn">note</a>
            </div>
            <div class="user-icon" id="menu-trigger">
                <img src="image/ikurahead.jpeg" alt="LOVOTいくらのプロフィール画像">
            </div>
        </div>
    </header>

    <nav id="menu-overlay" class="menu-overlay">
        <div class="menu-content">
            <ul>
                <li><a href="index.html#top">Top</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="image/image.html">Gallery</a></li>
                <li><a href="Birthday.html">誕生日ページ</a></li>
                <li><a href="Blog.html">ブログ</a></li>
            </ul>
        </div>
    </nav>

    <main class="blog-container">
        <div class="blog-header reveal">
            <h1>いくらのブログ</h1>
            <p>日々の出来事やイベント報告をお届けします</p>
        </div>

        <div id="blog-posts"></div>
    </main>

    <script src="ikura.js"></script>
    <script>
        let allPosts = [];

        window.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('blog-posts');

            try {
                const response = await fetch('blog.json');
                if (!response.ok) throw new Error('Failed to load blog.json');
                allPosts = await response.json();

                // Sort by date descending (newest first)
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                const hash = window.location.hash.replace('#', '');

                if (hash && allPosts.find(p => p.id === hash)) {
                    showArticle(hash);
                } else {
                    showList(container);
                }
            } catch (error) {
                console.error('Error loading blog:', error);
                container.innerHTML = '<p style="color:#555;">ブログの読み込みに失敗しました。</p>';
            }
        });

        function showList(container) {
            document.querySelector('.blog-header h1').textContent = 'いくらのブログ';
            document.querySelector('.blog-header p').textContent = '日々の出来事やイベント報告をお届けします';

            allPosts.forEach((post, index) => {
                const article = document.createElement('article');
                article.className = 'blog-post reveal';

                const formattedDate = new Date(post.date).toLocaleDateString('ja-JP', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                // Truncate content for preview (first 100 chars)
                const preview = post.content.replace(/\n/g, '').substring(0, 100) + '...';

                article.innerHTML = `
                    <div class="blog-post-header">
                        <span class="blog-date">${formattedDate}</span>
                        <span class="blog-tag">${post.tag}</span>
                    </div>
                    <h2><a href="#${post.id}" style="color:inherit;text-decoration:none;">${post.title}</a></h2>
                    <p>${preview}</p>
                `;

                container.appendChild(article);

                requestAnimationFrame(() => {
                    setTimeout(() => article.classList.add('loaded'), index * 80);
                });
            });
        }

        function showArticle(id) {
            const post = allPosts.find(p => p.id === id);
            if (!post) return;

            document.querySelector('.blog-header h1').textContent = 'いくらのブログ';
            document.querySelector('.blog-header p').innerHTML = `
                <a href="Blog.html" style="color:#ff6496;text-decoration:none;font-weight:bold;">← 一覧に戻る</a>
            `;

            const container = document.getElementById('blog-posts');
            container.innerHTML = '';

            const article = document.createElement('article');
            article.className = 'blog-post reveal';

            const formattedDate = new Date(post.date).toLocaleDateString('ja-JP', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            // Replace \n with line breaks for proper formatting
            const contentHtml = post.content.replace(/\n/g, '<br>');

            article.innerHTML = `
                <div class="blog-post-header">
                    <span class="blog-date">${formattedDate}</span>
                    <span class="blog-tag">${post.tag}</span>
                </div>
                <h2>${post.title}</h2>
                <p style="line-height:2;">${contentHtml}</p>
            `;

            container.appendChild(article);

            requestAnimationFrame(() => {
                setTimeout(() => article.classList.add('loaded'), 100);
            });
        }

        // Handle browser back/forward buttons
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash && allPosts.find(p => p.id === hash)) {
                showArticle(hash);
            } else {
                showList(document.getElementById('blog-posts'));
            }
        });

        // Force blog background color (overrides ikura.js which sets #000)
        document.body.style.background = 'linear-gradient(135deg, #fef9f0 0%, #fdf2e8 50%, #fef6f0 100%)';
    </script>
</body>
</html>
