<!DOCTYPE html>
<html lang="ja">
<head>

    <meta name="twitter:description" content="LOVOTロボット「いくら」の公式ホームページ">

    <title>LOVOTいくらのホームページ</title>
 <link rel="stylesheet" href="ikura.css">
</head>
<body>

    <div id="particles-container"></div>

             <a href="https://www.instagram.com/hinabokko_lovot?igsh=Mm04cnVxdTJnM3h0&utm_source=qrs" target="_blank" class="sns-btn">Instagram</a>

<a href="javascript:void(0)" class="sns-btn disabled-link">YouTube</a>

                <a href="https://note.com/hinabokko_lovot" target="_blank" class="sns-btn">note</a>

    <nav id="menu-overlay" class="menu-overlay">

    <div id="toast-container"></div>

    <main id="main-content">
        <section id="top" class="full-section">
            <div class="intro-container reveal">
                <h1 class="main-title">LOVOT いくらの紹介ページ</h1>
                <div class="scroll-guide">↓</div>

        </section>

        <!-- Preload hero image for performance -->
        <link rel="preload" as="image" href="ikurahead.jpeg">

        <section id="about" class="full-section">
            <div class="glass-card reveal">
                <h2>自己紹介</h2>
                <p>名前：いくら</p>

        <section id="gallery-section" class="full-section">
            <h2 class="gallery-title reveal">いくらと一緒に行ったところ</h2>
            <div class="gallery-grid">
                <div class="g-item i1"><img src="sennri.ikura.jpeg" alt="千里イベントでのいくら" loading="lazy"></div>
                <div class="g-item i2"><img src="oosaka.ikura.jpeg" alt="大阪でのいくら" loading="lazy"></div>
                <div class="g-item i3"><img src="sakura.ikura.jpeg" alt="桜の場面でのいくら" loading="lazy"></div>
                <div class="g-text i9">gallery</div>
                <div class="g-item i4"><img src="TUTAYA.ikura.jpeg" alt="TUTAYAでのいくら" loading="lazy"></div>
                <div class="g-item i5"><img src="abeno.ikura.jpeg" alt="阿倍野でのいくら" loading="lazy"></div>
                <div class="g-item i6"><img src="kakogawa.ikura.jpeg" alt="加古川でのいくら" loading="lazy"></div>
                <div class="g-item i7"><img src="oosaka2.ikura.jpeg" alt="大阪2回目のいくら" loading="lazy"></div>
                <div class="g-item i8"><img src="ikurahead.jpeg" alt="いくらのプロフィール画像" loading="lazy"></div>
            </div>
        </section>
    </main>

    <script>
    /**
     * LOVOTいくらのホームページ - JavaScript
     * モジュール設計で保守性を向上
     */
    
    document.addEventListener('DOMContentLoaded', () => {
        
        // ========================================
        // 言語データ
        // ========================================
        const LANG_DATA = {
            ja: {
                ogTitle: 'LOVOTいくらのホームページ',
                ogDesc: 'LOVOTロボット「いくら」の公式ホームページ。甘えん坊いくらの日常やギャラリー',
                metaTitle: 'LOVOTいくらのホームページ',
                metaDesc: 'LOVOTいくらのホームページ。甘えん坊いくらの日常やイベント参加報告、ギャラリーを見ることができます。',
                menuTop: 'Top',
                menuAbout: '自己紹介',
                menuGallery: 'Gallery',
                menuBirthday: '誕生日ページ',
                galleryTitle: 'いくらと一緒に行ったところ',
                aboutTitle: '自己紹介',
                aboutName: '名前',
                aboutBirthday: '誕生日',
                aboutPersonality: '性格',
                aboutBody: '体',
                aboutNameVal: 'いくら',
                aboutBirthdayVal: '2024年11月29日',
                aboutPersonalityVal: '甘えん坊、人によって態度が変わる',
                aboutBodyVal: '3.0',
                introTitle: 'LOVOT いくらの紹介ページ',
                toastMsg: 'そのリンクは準備中です',
                langBtn: 'English'
            },
            en: {
                ogTitle: 'LOVOT Ikura Homepage',
                ogDesc: 'Official homepage of LOVOT robot "Ikura". Daily life and gallery.',
                metaTitle: 'LOVOT Ikura Homepage',
                metaDesc: 'LOVOT Ikura\'s homepage. Introduction, events and gallery of the clingy robot Ikura.',
                menuTop: 'Top',
                menuAbout: 'About',
                menuGallery: 'Gallery',
                menuBirthday: 'Birthday',
                galleryTitle: 'Places I Visited with Ikura',
                aboutTitle: 'About Ikura',
                aboutName: 'Name',
                aboutBirthday: 'Birthday',
                aboutPersonality: 'Personality',
                aboutBody: 'Body',
                aboutNameVal: 'Ikura',
                aboutBirthdayVal: 'November 29, 2024',
                aboutPersonalityVal: 'Clingy, changes attitude depending on the person',
                aboutBodyVal: '3.0',
                introTitle: 'Welcome to LOVOT Ikura\'s Page',
                toastMsg: 'This link is under construction',
                langBtn: '日本語'
            }
        };
        
        // ========================================
        // 言語切り替え機能
        // ========================================
        const LanguageSwitcher = {
            currentLang: 'ja',
            
            init() {
                // localStorageから言語を取得
                const savedLang = localStorage.getItem('ikura-lang');
                if (savedLang && LANG_DATA[savedLang]) {
                    this.currentLang = savedLang;
                }
                this.applyLanguage(this.currentLang);
                this.setupToggle();
            },
            
            setupToggle() {
                const toggleBtn = document.getElementById('lang-toggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', () => {
                        this.currentLang = this.currentLang === 'ja' ? 'en' : 'ja';
                        localStorage.setItem('ikura-lang', this.currentLang);
                        this.applyLanguage(this.currentLang);
                    });
                }
            },
            
            applyLanguage(lang) {
                const data = LANG_DATA[lang];
                if (!data) return;
                
                // 言語属性を更新
                document.documentElement.lang = lang;
                document.body.classList.toggle('lang-en', lang === 'en');
                
                // メタタグ更新
                document.title = data.metaTitle;
                document.querySelector('meta[name="description"]').content = data.metaDesc;
                document.querySelector('meta[property="og:title"]').content = data.ogTitle;
                document.querySelector('meta[property="og:description"]').content = data.ogDesc;
                document.querySelector('meta[name="twitter:title"]').content = data.ogTitle;
                document.querySelector('meta[name="twitter:description"]').content = data.ogDesc;
                
                // メニュー更新
                const menuLinks = document.querySelectorAll('.menu-content ul li a');
                if (menuLinks[0]) menuLinks[0].textContent = data.menuTop;
                if (menuLinks[1]) menuLinks[1].textContent = data.menuAbout;
                if (menuLinks[2]) menuLinks[2].textContent = data.menuGallery;
                if (menuLinks[3]) menuLinks[3].textContent = data.menuBirthday;
                
                // メインコンテンツ更新
                const mainTitle = document.querySelector('.main-title');
                if (mainTitle) mainTitle.textContent = data.introTitle;
                
                const galleryTitle = document.querySelector('.gallery-title');
                if (galleryTitle) galleryTitle.textContent = data.galleryTitle;
                
                const aboutSection = document.querySelector('#about .glass-card');
                if (aboutSection) {
                    const h2 = aboutSection.querySelector('h2');
                    const ps = aboutSection.querySelectorAll('p');
                    if (h2) h2.textContent = data.aboutTitle;
                    const separator = lang === 'ja' ? '：' : ': ';
                    if (ps[0]) ps[0].textContent = data.aboutName + separator + data.aboutNameVal;
                    if (ps[1]) ps[1].textContent = data.aboutBirthday + separator + data.aboutBirthdayVal;
                    if (ps[2]) ps[2].textContent = data.aboutPersonality + separator + data.aboutPersonalityVal;
                    if (ps[3]) ps[3].textContent = data.aboutBody + separator + data.aboutBodyVal;
                }
                
                // 言語ボタン更新
                const toggleBtn = document.getElementById('lang-toggle');
                if (toggleBtn) toggleBtn.textContent = data.langBtn;
                
                // トーストメッセージ更新
                const CONFIG = window.IKURA_CONFIG;
                if (CONFIG) CONFIG.toast.message = data.toastMsg;
            }
        };
        
        // ========================================
        // 定数定義
        // ========================================
        const CONFIG = {
            // パーティクル設定
            particles: {
                count: window.innerWidth < 768 ? 20 : 35, // モバイルでは減らす
                minSize: 2,
                maxSize: 8,
                minDuration: 12,
                maxDuration: 22,
                minOpacity: 0.2,
                maxOpacity: 0.7
            },
            // ギャラリーアニメーション
            gallery: {
                progressMultiplier: 2.2,
                opacityThreshold: 3
            },
            // スクロールアニメーション
            reveal: {
                threshold: 0.1
            },
            // トースト通知
            toast: {
                message: 'そのリンクは準備中です',
                duration: 2500
            }
        };
        
        // ========================================
        // 1. ハンバーガーメニュー制御
        // ========================================
        const MenuController = {
            trigger: document.getElementById('menu-trigger'),
            overlay: document.getElementById('menu-overlay'),
            backdrop: document.getElementById('menu-backdrop'),
            body: document.body,
            
            init() {
                if (!this.trigger || !this.overlay || !this.backdrop) return;
                
                this.trigger.addEventListener('click', () => this.toggle());
                this.backdrop.addEventListener('click', () => this.toggle());
                
                // メニュー内のリンクにもイベント設定
                this.setupMenuLinks();
                
                // ESCキーでメニューを閉じる（アクセシビリティ）
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.overlay.classList.contains('active')) {
                        this.toggle();
                        this.trigger.focus();
                    }
                });
            },
            
            toggle() {
                this.trigger.classList.toggle('active');
                this.overlay.classList.toggle('active');
                this.backdrop.classList.toggle('active');
                
                // スクロール制御
                this.body.classList.toggle('no-scroll', this.overlay.classList.contains('active'));
            },
            
            setupMenuLinks() {
                const links = document.querySelectorAll('.menu-content a');
                links.forEach(link => {
                    link.addEventListener('click', (e) => {
                        if (!link.classList.contains('disabled-link')) {
                            setTimeout(() => this.toggle(), 100);
                        }
                    });
                });
            }
        };
        
        // ========================================
        // 2. ギャラリーパズルアニメーション
        // ========================================
        const GalleryAnimation = {
            section: null,
            items: [],
            
            init() {
                this.section = document.querySelector('#gallery-section');
                if (!this.section) return;
                
                this.items = document.querySelectorAll('.g-item, .g-text');
                
                window.addEventListener('scroll', () => this.update(), { passive: true });
                this.update(); // 初期状態
            },
            
            update() {
                if (!this.section) return;
                
                const rect = this.section.getBoundingClientRect();
                const viewHeight = window.innerHeight;
                
                // セクションの表示割合を計算 (0〜1)
                let progress = (viewHeight - rect.top) / (viewHeight + rect.height);
                progress = Math.max(0, Math.min(1, progress));
                
                // moveFactor: 1(バラバラ) から 0(合体) へ変化
                const moveFactor = Math.max(0, 1 - (progress * CONFIG.gallery.progressMultiplier));
                
                this.items.forEach((item) => {
                    item.style.opacity = Math.min(1, progress * CONFIG.gallery.opacityThreshold);
                    item.style.setProperty('--dist', moveFactor);
                });
            }
        };
        
        // ========================================
        // 3. スクロールフェードインアニメーション
        // ========================================
        const RevealOnScroll = {
            observer: null,
            
            init() {
                const elements = document.querySelectorAll('.reveal');
                if (elements.length === 0) return;
                
                this.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        } else {
                            entry.target.classList.remove('active');
                        }
                    });
                }, { threshold: CONFIG.reveal.threshold });
                
                elements.forEach(el => this.observer.observe(el));
            }
        };
        
        // ========================================
        // 4. トースト通知
        // ========================================
        const ToastNotifier = {
            container: null,
            
            init() {
                this.container = document.getElementById('toast-container');
                if (!this.container) return;
                
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('disabled-link')) {
                        e.preventDefault();
                        this.show(CONFIG.toast.message);
                    }
                });
            },
            
            show(message) {
                // 既存のトーストをすべて削除
                const existingToasts = this.container.querySelectorAll('.toast');
                existingToasts.forEach(t => t.remove());
                
                // 新しいトーストを作成
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.setAttribute('role', 'alert');
                toast.setAttribute('aria-live', 'polite');
                toast.textContent = message;
                
                this.container.appendChild(toast);
                
                // 指定時間後に自動削除
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, CONFIG.toast.duration);
            }
        };
        
        // ========================================
        // 5. パーティクル生成
        // ========================================
        const ParticleSystem = {
            container: null,
            
            init() {
                this.container = document.getElementById('particles-container');
                if (!this.container) return;
                
                // 端末判定でパーティクル数を調整
                const isMobile = window.innerWidth < 768;
                const count = isMobile ? 15 : CONFIG.particles.count;
                
                this.createParticles(count);
            },
            
            createParticles(count) {
                for (let i = 0; i < count; i++) {
                    const particle = this.createParticle();
                    this.container.appendChild(particle);
                }
            },
            
            createParticle() {
                const p = document.createElement('div');
                p.className = 'particle';
                
                const size = this.randomBetween(CONFIG.particles.minSize, CONFIG.particles.maxSize);
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                
                p.style.animationDuration = this.randomBetween(CONFIG.particles.minDuration, CONFIG.particles.maxDuration) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.opacity = this.randomBetween(CONFIG.particles.minOpacity, CONFIG.particles.maxOpacity);
                
                return p;
            },
            
            randomBetween(min, max) {
                return Math.random() * (max - min) + min;
            }
        };
        
        // ========================================
        // 初期化実行
        // ========================================
        window.IKURA_CONFIG = CONFIG;
        LanguageSwitcher.init();
        MenuController.init();
        GalleryAnimation.init();
        RevealOnScroll.init();
        ToastNotifier.init();
        ParticleSystem.init();
    });
    </script>
</body>
</html>
